# Starship prompt configuration
# Docs: https://starship.rs/config/

format = """
$directory\
$git_branch\
$git_status\
$terraform\
$golang\
$nodejs\
$aws\
$azure\
$line_break\
$character"""

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"
style = "bold red"

[terraform]
format = "[$symbol$workspace]($style) "
symbol = "󱁢 "
style = "bold 105"

[golang]
symbol = " "
style = "bold cyan"

[nodejs]
symbol = " "
style = "bold green"

[aws]
symbol = " "
style = "bold yellow"
format = '[$symbol($profile)(\($region\))]($style) '

[azure]
disabled = false
format = "[$symbol($subscription)]($style) "
symbol = "󰠅 "
style = "bold blue"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"